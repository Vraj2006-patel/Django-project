{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

<form method="post">

    {% csrf_token %}

    Username:
    <input type="text" name="username">
    <br><br>

    Password:
    <input type="password" name="password">
    <br><br>

    <input type="submit" value="Login">

</form>

{% endblock %}
