{% extends 'base.html' %}
{% block content %}
<h2>Edit Student</h2>

{% if form.errors %}
    <div style="color: red; border: 1px solid red; padding: 10px; margin-bottom: 15px;">
        <strong>Please fix the errors below:</strong>
        {{ form.errors }}
    </div>
{% endif %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update</button>
</form>
<br>
<p><a href="{% url 'student_list' %}">Cancel and Back to List</a></p>
{% endblock %}
