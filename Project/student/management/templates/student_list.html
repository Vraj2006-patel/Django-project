{% extends 'base.html' %}
{% block content %}
<p><a href="{% url 'add_student' %}">Add Student</a></p>
<table border="1" cellpadding="5" cellspacing="0">
    <thead>
        <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>Semester</th>
            <th>Email</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.branch }}</td>
            <td>{{ student.semester }}</td>
            <td>{{ student.email }}</td>
            <td>
                <a href="{% url 'edit_student' student.id %}">Edit</a> 
                <a href="{% url 'delete_student' student.id %}">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No student records found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
