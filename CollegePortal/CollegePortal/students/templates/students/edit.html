{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-warning">

        <h4>

            <i class="bi bi-pencil-square"></i>

            Edit Student

        </h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Name</label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ student.name }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Email</label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           value="{{ student.email }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Phone</label>

                    <input type="text"
                           name="phone"
                           class="form-control"
                           value="{{ student.phone }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Department</label>

                    <select name="department"
                            class="form-select">

                        <option {% if student.department == "CE" %}selected{% endif %}>
                            CE
                        </option>

                        <option {% if student.department == "IT" %}selected{% endif %}>
                            IT
                        </option>

                        <option {% if student.department == "EC" %}selected{% endif %}>
                            EC
                        </option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Semester</label>

                    <input type="number"
                           name="semester"
                           class="form-control"
                           value="{{ student.semester }}">

                </div>

                <div class="col-md-6 mb-3">

                    <label>CGPA</label>

                    <input type="number"
                           step="0.01"
                           name="cgpa"
                           class="form-control"
                           value="{{ student.cgpa }}">

                </div>

                <div class="col-md-12 mb-3">

                    <label>City</label>

                    <input type="text"
                           name="city"
                           class="form-control"
                           value="{{ student.city }}">

                </div>

            </div>

            <button class="btn btn-warning">

                Update Student

            </button>

        </form>

    </div>

</div>

{% endblock %}
