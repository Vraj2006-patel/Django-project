{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        <h4>

    <i class="bi bi-person-plus"></i>

    Add Student

</h4>

    </div>

    <div class="card-body">

        <form method="POST">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label>Name</label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Email</label>

                    <input type="email"
                           name="email"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Phone</label>

                    <input type="text"
                           name="phone"
                           class="form-control">

                </div>

                <div class="col-md-6 mb-3">

                    <label>Department</label>

                    <select name="department"
                            class="form-select">

                        <option>CE</option>

                        <option>IT</option>

                        <option>EC</option>

                    </select>

                </div>

                <div class="col-md-6 mb-3">

                    <label>Semester</label>

                    <input type="number"
                           name="semester"
                           class="form-control">

                </div>

                <div class="col-md-6 mb-3">

                    <label>CGPA</label>

                    <input type="number"
                           step="0.01"
                           name="cgpa"
                           class="form-control">

                </div>

                <div class="col-md-12 mb-3">

                    <label>City</label>

                    <input type="text"
                           name="city"
                           class="form-control">

                </div>

            </div>

            <button class="btn btn-success">

                Save Student

            </button>

        </form>

    </div>

</div>

{% endblock %}
